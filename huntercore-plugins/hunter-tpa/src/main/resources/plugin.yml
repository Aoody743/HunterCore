name: HunterTPA
version: ${version}
main: org.huntercore.plugins.tpa.HunterTpaPlugin
api-version: '1.21'
author: HunterCore
description: Built-in HunterCore teleport request plugin.
commands:
  tpa:
    description: Request to teleport to another player.
    usage: /tpa <player>
    permission: huntertpa.command.tpa
  tpahere:
    description: Request another player to teleport to you.
    usage: /tpahere <player>
    permission: huntertpa.command.tpahere
  tpaccept:
    description: Accept a teleport request.
    usage: /tpaccept [player]
    permission: huntertpa.command.tpaccept
  tpdeny:
    description: Deny a teleport request.
    usage: /tpdeny [player]
    permission: huntertpa.command.tpdeny
  tpcancel:
    description: Cancel your outgoing teleport request.
    usage: /tpcancel
    permission: huntertpa.command.tpcancel
  tptoggle:
    description: Toggle whether other players may send you teleport requests.
    usage: /tptoggle
    permission: huntertpa.command.tptoggle
  tpgui:
    description: Open the teleport GUI.
    usage: /tpgui
    permission: huntertpa.command.tpgui
  sethome:
    description: Set a named home.
    usage: /sethome [name]
    permission: huntertpa.command.sethome
  home:
    description: Teleport to a named home.
    usage: /home [name]
    permission: huntertpa.command.home
  delhome:
    description: Delete a named home.
    usage: /delhome [name]
    permission: huntertpa.command.delhome
  homes:
    description: Open your homes GUI or list homes with /homes list.
    usage: /homes [list|text]
    permission: huntertpa.command.homes
  homegui:
    description: Open your homes GUI.
    usage: /homegui
    aliases: [homesgui]
    permission: huntertpa.command.homes
  rtp:
    description: Randomly teleport to a safe location in your current world.
    usage: /rtp
    permission: huntertpa.command.rtp
permissions:
  huntertpa.command.tpa:
    default: true
  huntertpa.command.tpahere:
    default: true
  huntertpa.command.tpaccept:
    default: true
  huntertpa.command.tpdeny:
    default: true
  huntertpa.command.tpcancel:
    default: true
  huntertpa.command.tptoggle:
    default: true
  huntertpa.command.tpgui:
    default: true
  huntertpa.command.sethome:
    default: true
  huntertpa.command.home:
    default: true
  huntertpa.command.delhome:
    default: true
  huntertpa.command.homes:
    default: true
  huntertpa.command.rtp:
    default: true
