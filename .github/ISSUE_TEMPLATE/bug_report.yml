name: Bug report
description: Report a HunterCore problem
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Before reporting an issue, make sure you are running the latest HunterCore release and have searched existing issues.

  - type: checkboxes
    attributes:
      label: Checklist
      description: Please confirm these before submitting.
      options:
        - label: I have searched existing HunterCore issues.
          required: true
        - label: I am using the latest HunterCore release or latest GitHub Actions build.
          required: true
        - label: I tested whether the issue also happens on upstream DivineMC or Purpur when that comparison is practical.
          required: false

  - type: textarea
    attributes:
      label: What behavior is observed?
      description: A clear and concise description of the behavior.
    validations:
      required: true

  - type: textarea
    attributes:
      label: What is the expected behavior?
      description: A clear and concise description of what you expected to see.
    validations:
      required: true

  - type: textarea
    attributes:
      label: How to reproduce?
      description: Steps to reproduce this behavior.
      placeholder: |
        1. Start the server ...
        2. Execute command /example ...
        3. Server crashes ...
        4. See error
    validations:
      required: true

  - type: input
    attributes:
      label: Spark profiler link
      description: Optional, but very helpful for performance issues. See https://spark.lucko.me/docs/.
    validations:
      required: false

  - type: input
    attributes:
      label: Error log or full latest.log
      description: Upload relevant logs to https://mclo.gs, https://pastes.dev, or another paste service and paste the link here.
    validations:
      required: false
