name: Build HunterCore

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: huntercore-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_NUMBER: ${{ github.run_number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Configure Git and Gradle
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          chmod +x gradlew
          chmod +x scripts/prepare-bundled-plugins.sh

      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace --no-daemon

      - name: Build paperclip
        run: ./gradlew createPaperclipJar --stacktrace --no-daemon

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          version="$(grep '^mcVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          out="build/huntercore-artifacts"
          mkdir -p "$out"
          cp divinemc-server/build/libs/divinemc-paperclip-*.jar "$out/HunterCore-${version}-${GITHUB_RUN_NUMBER}-paperclip.jar"
          cp divinemc-server/build/libs/divinemc-bundler-*.jar "$out/" || true
          cp divinemc-server/build/libs/divinemc-server-*.jar "$out/" || true
          cp divinemc-api/build/libs/divinemc-api-*.jar "$out/" || true
          (cd "$out" && sha256sum * > SHA256SUMS.txt)

      - name: Upload jars
        uses: actions/upload-artifact@v5
        with:
          name: HunterCore-${{ github.run_number }}
          path: build/huntercore-artifacts/*
