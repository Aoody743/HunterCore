name: Release HunterCore

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v26.1.2-huntercore.1
        required: true
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: huntercore-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BUILD_NUMBER: ${{ github.run_number }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Configure Git and Gradle
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          chmod +x gradlew
          chmod +x scripts/prepare-bundled-plugins.sh

      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace --no-daemon

      - name: Build HunterCore release jar
        run: ./gradlew packageHunterCoreRelease --stacktrace --no-daemon --no-configuration-cache

      - name: Prepare release assets
        id: assets
        run: |
          set -euo pipefail
          tag="${RELEASE_VERSION_INPUT:-${GITHUB_REF_NAME}}"
          if [ -z "$tag" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          case "$tag" in
            v*) ;;
            *) tag="v${tag}" ;;
          esac
          tag_version="${tag#v}"
          huntercore_version="$(grep '^huntercoreVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          mc_version="$(grep '^mcVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          release_channel="$(grep '^releaseChannel=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          out="build/huntercore-release"
          web_root="build/huntercore-web-panel"
          mkdir -p "$out"
          jar_name="HunterCore-${huntercore_version}-MinecraftServer-${mc_version}-${release_channel}.jar"
          web_name="HunterCore-${huntercore_version}-WebPanel-${mc_version}-${release_channel}.zip"
          cp "divinemc-server/build/libs/${jar_name}" "$out/${jar_name}"
          rm -rf "$web_root"
          mkdir -p "$web_root/assets"
          cp huntercore-plugins/hunter-tools/src/main/resources/web-panel/index.html "$web_root/index.html"
          cp huntercore-plugins/hunter-tools/src/main/resources/web-panel/app.css "$web_root/assets/app.css"
          cp huntercore-plugins/hunter-tools/src/main/resources/web-panel/app.js "$web_root/assets/app.js"
          cp huntercore-plugins/hunter-tools/src/main/resources/web-panel/panel-bg.jpg "$web_root/assets/panel-bg.jpg"
          cat > "$web_root/README.txt" <<'TXT'
          HunterCore Web Panel

          Deploy these files to any static web host. Open the panel, fill the backend URL (for example http://server.example.com:8088) and optional API key in the Web console connection form.
          TXT
          python3 - <<PY
          from pathlib import Path
          import zipfile
          root = Path("${web_root}")
          out = Path("${out}") / "${web_name}"
          with zipfile.ZipFile(out, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=9) as archive:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(root).as_posix())
          PY
          (cd "$out" && sha256sum * > SHA256SUMS.txt)
          {
            echo "tag=$tag"
            echo "version=$tag_version"
            echo "out=$out"
          } >> "$GITHUB_OUTPUT"
          cat > "$out/RELEASE_NOTES.md" <<EOF
          HunterCore ${tag}

          Built from commit ${GITHUB_SHA}.

          Highlights:
          - Optimized web panel layout with Settings / Access / AI / Admin pages and in-page category navigation.
          - Unified command system around /hc, /hplayer, and /hnpc with Chinese/English help and language switching.
          - HunterAuth web registration/login, TPA/Home commands, and clickable teleport accept/deny chat UI.
          - Web-editable MOTD, F3 server name, sidebar, TPS actionbar/subtitle text, and AI settings.
          - Common-native slim release jar under 100MB while keeping Linux/macOS/Windows x86_64/aarch64 native libraries.
          - Standalone WebPanel zip for separated frontend deployments with backend URL and optional API key connection.

          Assets:
          - ${jar_name}
          - ${web_name}
          - SHA256SUMS.txt
          EOF

      - name: Create or update GitHub release
        run: |
          set -euo pipefail
          tag="${{ steps.assets.outputs.tag }}"
          out="${{ steps.assets.outputs.out }}"
          assets=("$out"/*.jar "$out"/*.zip "$out"/SHA256SUMS.txt)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file "$out/RELEASE_NOTES.md"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "HunterCore $tag" \
              --notes-file "$out/RELEASE_NOTES.md"
          fi
