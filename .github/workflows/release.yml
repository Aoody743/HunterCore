name: Release HunterCore

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v26.1.2-huntercore.1
        required: true
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: huntercore-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BUILD_NUMBER: ${{ github.run_number }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Configure Git and Gradle
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          chmod +x gradlew
          chmod +x scripts/prepare-bundled-plugins.sh

      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace --no-daemon

      - name: Build paperclip
        run: ./gradlew createPaperclipJar --stacktrace --no-daemon

      - name: Prepare release assets
        id: assets
        run: |
          set -euo pipefail
          tag="${RELEASE_VERSION_INPUT:-${GITHUB_REF_NAME}}"
          if [ -z "$tag" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          case "$tag" in
            v*) ;;
            *) tag="v${tag}" ;;
          esac
          version="${tag#v}"
          out="build/huntercore-release"
          mkdir -p "$out"
          cp divinemc-server/build/libs/divinemc-paperclip-*.jar "$out/HunterCore-${version}-paperclip.jar"
          cp divinemc-api/build/libs/divinemc-api-*.jar "$out/" || true
          (cd "$out" && sha256sum * > SHA256SUMS.txt)
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "out=$out"
          } >> "$GITHUB_OUTPUT"
          cat > "$out/RELEASE_NOTES.md" <<EOF
          HunterCore ${tag}

          Built from commit ${GITHUB_SHA}.

          Bundled plugins:
          - ViaVersion 5.9.1
          - ViaBackwards 5.9.1
          - ViaRewind 4.1.1
          - BlueMap 5.20
          - Chunky 1.5.3
          - PlaceholderAPI 2.12.2
          - Vault 1.7.3
          - WorldEdit 7.4.3
          - WorldGuard 7.0.17
          - Multiverse-Core 5.7.0
          - LuckPerms 5.5.55
          - CoreProtect 23.2
          - HunterTPA builtin
          - HunterAuth builtin
          - HunterTools builtin

          Highlights:
          - Central preferences file at plugins/HunterCore/preferences.yml
          - HunterTools TPS/actionbar/sidebar/management and essentials-style commands
          - HunterTools fake players and NPCs with persistent preferences.yml definitions
          - Built-in HunterCore web panel with guest map/status, player users, and admin command execution
          - Web panel CSRF protection plus per-user command execution and allowed-command overrides
          - BlueMap web map bundle; first use requires accepting BlueMap's resource download in plugins/BlueMap/core.conf
          - Common server foundation plugins: PlaceholderAPI, Vault, WorldEdit, and WorldGuard
          - Cached guest status responses for lower public web panel main-thread pressure
          - Configurable module and command toggles
          - Parallel bundled plugin install plus async HunterTools rendering/saving/actor loading/web serving
          - CPU-aware Paper/DivineMC worker, Netty IO, and ForkJoin defaults
          EOF

      - name: Create or update GitHub release
        run: |
          set -euo pipefail
          tag="${{ steps.assets.outputs.tag }}"
          out="${{ steps.assets.outputs.out }}"
          assets=("$out"/*.jar "$out"/SHA256SUMS.txt)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file "$out/RELEASE_NOTES.md"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "HunterCore $tag" \
              --notes-file "$out/RELEASE_NOTES.md"
          fi
